test:
  <<: *default
  database: backend_test
  host: <%= ENV.fetch("BACKEND_DATABASE_HOST", "127.0.0.1") %>
  username: root
  password: MEHARZ499206
  port: <%= ENV.fetch("BACKEND_DATABASE_PORT", 3306) %>

production:
  primary: &primary_production
    <<: *default
    database: <%= ENV.fetch("DATABASE_NAME", "defaultdb") %>
    host: <%= ENV.fetch("BACKEND_DATABASE_HOST", "localhost") %>
    username: <%= ENV.fetch("BACKEND_DATABASE_USER", "root") %>
    password: <%= ENV.fetch("BACKEND_DATABASE_PASSWORD", "") %>
    port: <%= ENV.fetch("BACKEND_DATABASE_PORT", 3306) %>
    ssl_mode: :verify_identity
    ssl_verify: false


  cache:
    <<: *primary_production
    database: backend_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: backend_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: backend_production_cable
    migrations_paths: db/cable_migrate

